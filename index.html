<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="/src/assets/images/portfoliologo.svg"
    />

    <!-- Basic SEO -->
    <title>Alexander Melander — Full-stack Developer</title>
    <meta
      name="description"
      content="Swedish full-stack developer focused on frontend. I build React frontends, headless WordPress sites, and the occasional trading bot."
    />
    <meta name="author" content="Alexander Melander" />

    <!-- Open Graph (LinkedIn, Slack, Discord, Facebook, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://alexmelander.vercel.app/" />
    <meta
      property="og:title"
      content="Alexander Melander — Full-stack Developer"
    />
    <meta
      property="og:description"
      content="Swedish full-stack developer focused on frontend. I build React frontends, headless WordPress sites, and the occasional trading bot."
    />
    <meta
      property="og:image"
      content="https://alexmelander.vercel.app/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://alexmelander.vercel.app/" />
    <meta
      name="twitter:title"
      content="Alexander Melander — Full-stack Developer"
    />
    <meta
      name="twitter:description"
      content="Swedish full-stack developer focused on frontend. I build React frontends, headless WordPress sites, and the occasional trading bot."
    />
    <meta
      name="twitter:image"
      content="https://alexmelander.vercel.app/og-image.png"

    <!-- Mobile theme color (Chrome on Android shows this on the address bar) -->
    <meta name="theme-color" content="#0f172a" />
